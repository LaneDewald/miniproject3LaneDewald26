{% extends "base.html" %}
{% block title %}Add Movie - Movie Watchlist{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-3">Add a Movie</h2>
    <form method="POST">
      <div class="mb-3">
        <label for="title" class="form-label">Movie Title</label>
        <input type="text" class="form-control" id="title" name="title" placeholder="e.g. Interstellar" required />
      </div>
      <div class="mb-3">
        <label for="genre" class="form-label">Genre</label>
        <select class="form-select" id="genre" name="genre">
          <option value="">-- Select a Genre --</option>
          <option>Action</option>
          <option>Comedy</option>
          <option>Drama</option>
          <option>Horror</option>
          <option>Sci-Fi</option>
          <option>Thriller</option>
          <option>Animation</option>
          <option>Other</option>
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-dark">Add Movie</button>
        <a href="{{ url_for('watchlist') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
