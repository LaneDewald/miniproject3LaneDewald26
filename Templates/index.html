</html>{% extends "base.html" %}
{% block title %}Home - Movie Watchlist{% endblock %}

{% block content %}
<div class="text-center py-5">
  <h1 class="display-4">🎬 Movie Watchlist</h1>
  <p class="lead text-muted">Keep track of movies you want to watch.</p>

  {% if session.get('user_id') %}
    <a href="{{ url_for('watchlist') }}" class="btn btn-dark btn-lg me-2">My Watchlist</a>
    <a href="{{ url_for('add_movie') }}" class="btn btn-outline-dark btn-lg">Add a Movie</a>
  {% else %}
    <a href="{{ url_for('register') }}" class="btn btn-dark btn-lg me-2">Get Started</a>
    <a href="{{ url_for('login') }}" class="btn btn-outline-dark btn-lg">Login</a>
  {% endif %}
</div>
{% endblock %}
